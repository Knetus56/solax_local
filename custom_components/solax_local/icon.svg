<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- Soleil -->
  <circle cx="160" cy="40" r="30" fill="#FFD700" stroke="#FFA500" stroke-width="2"/>
  
  <!-- Rayons du soleil -->
  <g stroke="#FFA500" stroke-width="2" stroke-linecap="round">
    <line x1="160" y1="5" x2="160" y2="15"/>
    <line x1="160" y1="65" x2="160" y2="75"/>
    <line x1="195" y1="40" x2="185" y2="40"/>
    <line x1="125" y1="40" x2="135" y2="40"/>
    <line x1="185" y1="15" x2="177" y2="23"/>
    <line x1="143" y1="57" x2="135" y2="65"/>
    <line x1="185" y1="65" x2="177" y2="57"/>
    <line x1="143" y1="23" x2="135" y2="15"/>
  </g>
  
  <!-- Panneau solaire -->
  <rect x="20" y="60" width="120" height="70" fill="#2E5266" stroke="#1A3A4A" stroke-width="2"/>
  
  <!-- Cellules solaires (6 cellules: 2x3) -->
  <g fill="#1A5F7A" stroke="#0A3D5C" stroke-width="1">
    <!-- Rangée 1 -->
    <rect x="28" y="68" width="32" height="32" rx="2"/>
    <rect x="66" y="68" width="32" height="32" rx="2"/>
    <rect x="104" y="68" width="32" height="32" rx="2"/>
    <!-- Rangée 2 -->
    <rect x="28" y="106" width="32" height="22" rx="2"/>
    <rect x="66" y="106" width="32" height="22" rx="2"/>
    <rect x="104" y="106" width="32" height="22" rx="2"/>
  </g>
  
  <!-- Micro-onduleur Solax -->
  <g>
    <!-- Boîtier -->
    <rect x="60" y="145" width="80" height="45" fill="#333333" stroke="#000000" stroke-width="2" rx="4"/>
    
    <!-- Dégradé couleur (indication d'activité) -->
    <rect x="62" y="147" width="76" height="15" fill="#0066FF" opacity="0.3" rx="2"/>
    
    <!-- Logo/texte Solax -->
    <text x="100" y="165" font-size="12" font-weight="bold" fill="#FFD700" text-anchor="middle">SOLAX</text>
    
    <!-- Voyants LED -->
    <circle cx="75" cy="180" r="3" fill="#00FF00"/>
    <circle cx="85" cy="180" r="3" fill="#FFA500"/>
    <circle cx="95" cy="180" r="3" fill="#FF0000" opacity="0.5"/>
    
    <!-- Connecteurs -->
    <g fill="#C0C0C0" stroke="#808080" stroke-width="0.5">
      <rect x="112" y="175" width="8" height="6" rx="1"/>
      <rect x="122" y="175" width="8" height="6" rx="1"/>
      <rect x="132" y="175" width="8" height="6" rx="1"/>
    </g>
  </g>
  
  <!-- Flèche d'énergie -->
  <g stroke="#FFD700" stroke-width="2" stroke-linecap="round" fill="none">
    <path d="M 80 125 Q 80 140 85 145"/>
    <path d="M 75 140 L 85 145 L 83 135"/>
  </g>
  
  <!-- Gradient background (subtil) -->
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFF9E6;stop-opacity:0.1" />
      <stop offset="100%" style="stop-color:#87CEEB;stop-opacity:0.1" />
    </linearGradient>
  </defs>
  <rect width="200" height="200" fill="url(#bgGrad)"/>
</svg>